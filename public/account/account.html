<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Methalo Account</title>
  <link rel="stylesheet" href="account.css">
</head>
<body>

  <div id="account-container">

    <h1>Account Settings</h1>

    <!-- EMAIL -->
    <div class="section">
      <label>Email</label>
      <div id="account-email" class="readonly"></div>
    </div>

    <!-- DISPLAY NAME -->
    <div class="section">
      <label>Display Name</label>
      <input type="text" id="account-name">
      <button id="save-name">Save</button>

      <!-- Inline message for display name -->
      <div id="name-message" class="message"></div>
    </div>

    <!-- GOOGLE LINKING -->
    <div class="section">
      <label>Linked Google Account</label>
      <div id="google-status"></div>

      <button id="link-google">Link Google Account</button>
      <button id="unlink-google">Unlink Google Account</button>

      <!-- Inline message for Google linking -->
      <div id="google-message" class="message"></div>
    </div>

    <!-- PASSWORD CHANGE -->
    <div class="section">
      <label>Change Password</label>

      <!-- Field-level error (password mismatch, etc.) -->
      <div id="password-error" class="error-message"></div>

      <input type="password" id="current-password" placeholder="Current password">
      <input type="password" id="new-password" placeholder="New password">
      <input type="password" id="confirm-password" placeholder="Confirm new password">

      <button id="change-password">Change Password</button>

      <div id="forgot-password" class="forgot-link">Forgot password?</div>

      <!-- Inline message for password success/error -->
      <div id="password-message" class="message"></div>
    </div>

    <!-- SIGN OUT -->
    <div class="section">
      <label>Sign Out</label>
      <button id="signout-button">Sign Out</button>

      <!-- Inline message for signout errors -->
      <div id="signout-message" class="message"></div>
    </div>

  </div>

  <!-- Firebase compat CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>

  <!-- Your Firebase config (global window.firebaseConfig) -->
  <script src="/firebase-config.js"></script>

  <!-- Your account logic -->
  <script src="account.js"></script>

</body>
</html>
