<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8" />
  <title>Methalo Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./favicon.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="./browser.css" />
</head>

  <body>
    <!-- Browser Root -->
    <div id="browser-root">
      <div id="tab-bar"></div>
      <div id="toolbar"></div>
      <div id="content-area"></div>
    </div>

    <!-- ⭐ Firebase v10 (MUST load before browser.js) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBytm097ApDIFNoYBwloK03s1UZ8WaiqqM",
        authDomain: "methalo-browser.firebaseapp.com",
        projectId: "methalo-browser",
        storageBucket: "methalo-browser.firebasestorage.app",
        messagingSenderId: "901027603441",
        appId: "1:901027603441:web:c8690c37bebab8ac4f5a50",
        measurementId: "G-RX0N9RS0HE"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // ⭐ AUTH GUARD — blocks direct access
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "/index.html";
        } else {
          // Make user available to browser.js
          window.METHALO_USER = user;
        }
      });

      // ⭐ Expose signOut for profile menu
      window.methaloSignOut = () => signOut(auth);
    </script>

    <!-- ⭐ Main Browser Logic (runs AFTER Firebase) -->
    <script type="module" src="./browser.js"></script>
  </body>
</html>
