<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Methalo Login</title>

    <style>
        body {
            font-family: Inter, sans-serif;
            background: #eef1f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #card {
            width: 360px;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        #logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #4a6cf7;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
        }

        .tab.active {
            color: #4a6cf7;
            border-bottom: 3px solid #4a6cf7;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 14px;
            border: none;
            border-radius: 8px;
            background: #4a6cf7;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #3a5be0;
        }

        #googleLogin {
            background: #ffffff;
            color: #444;
            border: 1px solid #ccc;
        }

        #googleLogin:hover {
            background: #f5f5f5;
        }

        #forgot {
            margin-top: 10px;
            font-size: 14px;
            color: #4a6cf7;
            cursor: pointer;
        }

        #status {
            margin-top: 15px;
            color: #444;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>

<body>

<div id="card">
    <div id="logo">Methalo</div>

    <div class="tabs">
        <div id="tabLogin" class="tab active">Login</div>
        <div id="tabSignup" class="tab">Create Account</div>
    </div>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="emailLogin">Login</button>
    <button id="emailSignup" style="display:none;">Create Account</button>

    <div id="forgot">Forgot password?</div>

    <button id="googleLogin">Continue with Google</button>

    <p id="status"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword,
        GoogleAuthProvider, 
        signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ⭐ Your Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyBytm097ApDIFNoYBwloK03s1UZ8WaiqqM",
        authDomain: "methalo-browser.firebaseapp.com",
        projectId: "methalo-browser",
        storageBucket: "methalo-browser.firebasestorage.app",
        messagingSenderId: "901027603441",
        appId: "1:901027603441:web:c8690c37bebab8ac4f5a50",
        measurementId: "G-RX0N9RS0HE"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const status = document.getElementById("status");

    // ⭐ Tab switching
    const tabLogin = document.getElementById("tabLogin");
    const tabSignup = document.getElementById("tabSignup");
    const btnLogin = document.getElementById("emailLogin");
    const btnSignup = document.getElementById("emailSignup");

    tabLogin.onclick = () => {
        tabLogin.classList.add("active");
        tabSignup.classList.remove("active");
        btnLogin.style.display = "block";
        btnSignup.style.display = "none";
    };

    tabSignup.onclick = () => {
        tabSignup.classList.add("active");
        tabLogin.classList.remove("active");
        btnLogin.style.display = "none";
        btnSignup.style.display = "block";
    };

    async function createSessionAndRedirect() {
        status.innerText = "Creating session...";

        const sessionId = await fetch("/newsession").then(r => r.text());
        localStorage.setItem("sessionId", sessionId);

        status.innerText = "Redirecting...";
        setTimeout(() => window.location.href = "/browser/browser.html", 600);
    }

    // ⭐ Login
    btnLogin.onclick = async () => {
        const emailVal = document.getElementById("email").value.trim();
        const passwordVal = document.getElementById("password").value.trim();

        status.innerText = "Logging in...";

        if (!emailVal || !passwordVal) {
            status.innerText = "Enter email and password.";
            return;
        }

        try {
            await signInWithEmailAndPassword(auth, emailVal, passwordVal);
            await createSessionAndRedirect();
        } catch (err) {
            console.error(err);
            status.innerText = "Login failed. Check email and password.";
        }
    };

    // ⭐ Signup
    btnSignup.onclick = async () => {
        const emailVal = document.getElementById("email").value.trim();
        const passwordVal = document.getElementById("password").value.trim();

        status.innerText = "Creating account...";

        try {
            await createUserWithEmailAndPassword(auth, emailVal, passwordVal);
            await createSessionAndRedirect();
        } catch (err) {
            status.innerText = "Signup failed. Email already in use.";
            console.error(err);
        }
    };

    // ⭐ Forgot password → redirect to reset page
    document.getElementById("forgot").onclick = () => {
        window.location.href = "/account/reset.html";
    };

    // ⭐ Google login
    document.getElementById("googleLogin").onclick = async () => {
        status.innerText = "Opening Google login...";

        try {
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
            await createSessionAndRedirect();
        } catch (err) {
            status.innerText = "Google login failed.";
        }
    };
</script>

</body>
</html>
